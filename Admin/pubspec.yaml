name: admin
description: "TranZfort Admin - Operations, verification, and platform management"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Routing ---
  go_router: ^14.8.1

  # --- Backend (Supabase) ---
  supabase_flutter: ^2.9.0

  # --- Environment ---
  flutter_dotenv: ^5.2.1

  # --- Image viewing ---
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # --- Utilities ---
  intl: ^0.20.2
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  shared_preferences: ^2.5.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
