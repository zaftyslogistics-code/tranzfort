name: tranzfort
description: "TranZfort - Logistics marketplace connecting suppliers and truckers"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.7
  flutter: 3.38.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Routing ---
  go_router: ^14.8.1

  # --- Supabase & Auth ---
  supabase_flutter: ^2.9.0
  google_sign_in: ^6.3.0

  # --- Connectivity ---
  connectivity_plus: ^7.0.0

  # --- Voice & Audio ---
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  just_audio: ^0.9.43
  record: ^5.2.1

  # --- Location ---
  geolocator: ^13.0.2

  # --- Push Notifications ---
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.0
  flutter_local_notifications: ^18.0.1

  # --- Image & Camera ---
  image_picker: ^1.1.2
  image: ^4.5.3
  permission_handler: ^11.4.0

  # --- Maps ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # --- Storage & Prefs ---
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # --- Utilities ---
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  crypto: ^3.0.3
  pointycastle: ^3.9.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  mocktail: ^1.0.4

dependency_overrides:
  record_linux: ^1.1.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
    - assets/images/
